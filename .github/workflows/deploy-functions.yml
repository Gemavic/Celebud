# Auto-deploys Supabase Edge Functions when their source changes on main.
#
# Live function names differ from repo folder names in one case:
#   repo: supabase/functions/generate-article-draft  ->  live: "quick-task"
# (the site calls .../functions/v1/quick-task, so the live name must not change).
#
# JWT posture is preserved per function:
#   fetch-news is called from the browser with no auth header -> --no-verify-jwt
#   quick-task requires a signed-in admin session -> default JWT verification
#
# Requires one repository secret: SUPABASE_ACCESS_TOKEN
# (Supabase Dashboard -> Account -> Access Tokens -> Generate new token,
#  then GitHub repo -> Settings -> Secrets and variables -> Actions -> New repository secret)

name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: bwtrtzvlqvykobmlfjcl
    steps:
      - name: Check secret is configured
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it in GitHub repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy fetch-news (public endpoint, JWT off)
        run: supabase functions deploy fetch-news --project-ref "$PROJECT_REF" --no-verify-jwt

      - name: Stage generate-article-draft under its live name (quick-task)
        run: |
          mkdir -p supabase/functions/quick-task
          cp -r supabase/functions/generate-article-draft/. supabase/functions/quick-task/

      - name: Deploy quick-task (AI drafting, JWT on)
        run: supabase functions deploy quick-task --project-ref "$PROJECT_REF"
